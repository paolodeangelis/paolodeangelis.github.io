{%- if page.github_buttons == true or site.github_buttons.enabled == true -%}
<!-- GitHub Buttons -->
<script async defer src="https://buttons.github.io/buttons.js"></script>
{%- endif -%}

<!-- Local Bootstrap runtime dependencies -->
<script defer src="{{ '/assets/lib/jquery/jquery-3.5.1.slim.min.js' | relative_url }}"></script>
<script defer src="{{ '/assets/lib/bootstrap/js/bootstrap.bundle.min.js' | relative_url }}"></script>
<script defer src="{{ '/assets/lib/wow/wow.min.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/sweet-scroll.min.js' | prepend: site.baseurl }}"></script>
<script defer src="{{ '/assets/js/main.js' | prepend: site.baseurl }}"></script>

<!-- Initialize local UI helpers. -->
<script defer>
window.addEventListener('DOMContentLoaded', function () {
  if (window.WOW) {
    new WOW().init();
  }

  if (window.jQuery) {
    jQuery('[data-toggle="tooltip"]').tooltip();
  }
});
</script>
