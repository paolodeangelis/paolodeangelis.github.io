name: Optimize images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install image optimization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jpegoptim optipng webp libavif-bin

      - name: Generate WebP and AVIF files
        shell: bash
        run: |
          while IFS= read -r -d '' image; do
            base="${image%.*}"
            cwebp -quiet -q 82 "$image" -o "${base}.webp"
            avifenc --min 28 --max 36 --speed 6 "$image" "${base}.avif"
          done < <(find img assets -type f -size +16k \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' \) -print0)

      - name: Optimize JPEG files
        run: |
          find img assets -type f \( -iname '*.jpg' -o -iname '*.jpeg' \) -print0 \
            | xargs -0 --no-run-if-empty jpegoptim --strip-all --max=85

      - name: Optimize PNG files
        run: |
          find img assets -type f -iname '*.png' -print0 \
            | xargs -0 --no-run-if-empty optipng -o2 -strip all

      - name: Commit optimized images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Optimize image assets"
          file_pattern: "img assets"
